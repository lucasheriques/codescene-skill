<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Example branch-level CodeScene summary</title>
  <desc id="desc">Illustrative branch analysis screenshot showing a quality ratchet summary for an agent handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="0.55" stop-color="#19343a"/>
      <stop offset="1" stop-color="#283044"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .ink { fill: #0f172a; }
      .muted { fill: #64748b; }
      .ok { fill: #15803d; }
      .warn { fill: #b45309; }
      .blue { fill: #0369a1; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="36" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="96" y="76" width="1088" height="608" rx="30" fill="#f8fafc"/>
    <text x="144" y="136" class="sans ink" font-size="32" font-weight="800">Branch analysis handoff</text>
    <text x="144" y="174" class="mono muted" font-size="18">analyze_change_set(base: origin/main)</text>

    <g transform="translate(144 226)">
      <rect width="300" height="134" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="28" y="44" class="sans muted" font-size="17">Files reviewed</text>
      <text x="28" y="94" class="sans ink" font-size="48" font-weight="900">12</text>
    </g>
    <g transform="translate(490 226)">
      <rect width="300" height="134" rx="20" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text x="28" y="44" class="sans ok" font-size="17" font-weight="700">Ratchet passes</text>
      <text x="28" y="94" class="sans ink" font-size="48" font-weight="900">9</text>
    </g>
    <g transform="translate(836 226)">
      <rect width="300" height="134" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="28" y="44" class="sans warn" font-size="17" font-weight="700">Needs attention</text>
      <text x="28" y="94" class="sans ink" font-size="48" font-weight="900">3</text>
    </g>

    <g transform="translate(144 390)">
      <rect width="992" height="1" fill="#dbe3ef"/>
      <text x="0" y="44" class="sans ink" font-size="21" font-weight="800">Agent recommendation</text>
      <text x="0" y="82" class="sans muted" font-size="19">Fix one new low-health file before merge.</text>
      <text x="0" y="108" class="sans muted" font-size="19">Keep two legacy exceptions documented.</text>
      <text x="0" y="148" class="sans ink" font-size="21" font-weight="800">Highest-signal action</text>
      <text x="0" y="186" class="sans muted" font-size="19">Extract checkout eligibility into a pure helper.</text>
      <text x="0" y="212" class="sans muted" font-size="19">Cover the boundary cases before handoff.</text>
      <text x="0" y="252" class="sans ink" font-size="21" font-weight="800">Verification</text>
      <text x="0" y="282" class="mono blue" font-size="19">pnpm test:checkout &amp;&amp; pnpm typecheck</text>
    </g>
  </g>
</svg>
