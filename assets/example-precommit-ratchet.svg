<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Example pre-commit CodeScene ratchet output</title>
  <desc id="desc">Illustrative terminal-style screenshot showing CodeScene pre-commit safeguard results for touched files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#14313a"/>
      <stop offset="1" stop-color="#1c2430"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; }
      .ink { fill: #0f172a; }
      .terminal { fill: #0b1120; }
      .ok { fill: #16a34a; }
      .warn { fill: #d97706; }
      .cyan { fill: #0891b2; }
      .line { stroke: #d8dee9; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="36" fill="url(#bg)"/>
  <g opacity="0.42">
    <circle cx="1100" cy="136" r="96" fill="#22d3ee"/>
    <circle cx="172" cy="610" r="112" fill="#34d399"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="72" width="1096" height="616" rx="28" fill="url(#card)"/>
    <rect x="92" y="72" width="1096" height="72" rx="28" fill="#ffffff"/>
    <path d="M92 116h1096" stroke="#e2e8f0"/>
    <circle cx="130" cy="108" r="9" fill="#ef4444"/>
    <circle cx="160" cy="108" r="9" fill="#f59e0b"/>
    <circle cx="190" cy="108" r="9" fill="#22c55e"/>
    <text x="640" y="115" text-anchor="middle" class="sans" font-size="18" font-weight="700" fill="#334155">CodeScene pre-commit safeguard</text>

    <rect x="136" y="176" width="1008" height="120" rx="18" fill="#0b1120"/>
    <text x="168" y="222" class="mono" font-size="20" fill="#93c5fd">$ use $codescene-code-health before commit</text>
    <text x="168" y="260" class="mono" font-size="18" fill="#cbd5e1">scope: 4 modified files against HEAD</text>

    <g transform="translate(136 334)">
      <rect width="1008" height="62" rx="14" fill="#ffffff"/>
      <text x="28" y="39" class="mono ok" font-size="18" font-weight="700">OK</text>
      <text x="64" y="39" class="mono ink" font-size="20">apps/web/api/checkout/route.ts</text>
      <text x="640" y="39" class="mono muted" font-size="19">9.8</text>
      <text x="780" y="39" class="sans ok" font-size="18" font-weight="700">no regression</text>
    </g>

    <g transform="translate(136 410)">
      <rect width="1008" height="62" rx="14" fill="#ffffff"/>
      <text x="28" y="39" class="mono cyan" font-size="18" font-weight="700">UP</text>
      <text x="64" y="39" class="mono ink" font-size="20">backend/model/renewals.ts</text>
      <text x="640" y="39" class="mono muted" font-size="19">7.6 -> 8.4</text>
      <text x="780" y="39" class="sans cyan" font-size="18" font-weight="700">legacy improved</text>
    </g>

    <g transform="translate(136 486)">
      <rect width="1008" height="96" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="28" y="39" class="mono warn" font-size="22">!</text>
      <text x="64" y="39" class="mono ink" font-size="20">shared/billing/entitlements.ts</text>
      <text x="640" y="39" class="mono muted" font-size="19">8.9</text>
      <text x="780" y="39" class="sans warn" font-size="18" font-weight="700">new file below target</text>
      <text x="64" y="72" class="sans muted" font-size="17">Next step: extract renewal-window parsing and cover the boundary cases.</text>
    </g>

    <g transform="translate(136 612)">
      <rect width="1008" height="1" fill="#e2e8f0"/>
      <text x="0" y="38" class="sans ink" font-size="20" font-weight="700">Verification plan</text>
      <text x="176" y="38" class="mono muted" font-size="18">pnpm test:billing &amp;&amp; pnpm typecheck</text>
    </g>
  </g>
</svg>
